<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager Pro & Markdown</title>
  <link rel="stylesheet" href="style.css">
  <!-- Parser Markdown ultra-léger via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div class="app-container">
    <header>
      <h1>Mes Tâches</h1>
      <p id="counter">0 tâche restante</p>
    </header>

    <!-- Section Templates -->
    <div class="template-section">
      <label for="template-select">📋 Charger un template :</label>
      <select id="template-select">
        <option value="" disabled selected>Choisir un modèle...</option>
        <option value="dev">💻 Projet Web / Dev</option>
        <option value="school">📚 Cours & Révisions</option>
        <option value="routine">🌅 Routine Quotidienne</option>
      </select>
    </div>

    <!-- Formulaire d'ajout -->
    <form id="todo-form">
      <!-- Ligne principale : Titre & Priorité -->
      <div class="form-row">
        <input type="text" id="todo-input" placeholder="Titre de la tâche (**gras**, *italique*, `code`...)" required autocomplete="off">
        <select id="priority-select">
          <option value="low">Basse</option>
          <option value="medium" selected>Moyenne</option>
          <option value="high">Haute</option>
        </select>
      </div>

      <!-- Ligne secondaire : Description optionnelle -->
      <div class="form-row">
        <textarea id="todo-desc" placeholder="Description ou notes détaillées (optionnel)..." rows="2"></textarea>
      </div>

      <!-- Ligne tertiaire : Échéance & Bouton d'ajout -->
      <div class="form-row form-row-bottom">
        <div class="date-group">
          <label for="todo-duedate">⏰ Échéance :</label>
          <input type="datetime-local" id="todo-duedate">
        </div>
        <button type="submit" id="add-btn">Ajouter</button>
      </div>
    </form>

    <!-- Section Statistiques -->
    <div class="stats-container">
      <h3>Statistiques</h3>

      <!-- 1. Barre de progression Complétées vs En cours -->
      <div class="stat-block">
        <div class="stat-header">
          <span>Avancement</span>
          <span id="completion-ratio">0% faites • 0% à faire</span>
        </div>
        <div class="progress-bar-container">
          <div id="bar-true" class="progress-segment true" style="width: 0%;">
            <span class="segment-label">Faites</span>
          </div>
          <div id="bar-false" class="progress-segment false" style="width: 100%;">
            <span class="segment-label">À faire</span>
          </div>
        </div>
      </div>

      <!-- 2. Camembert des Priorités -->
      <div class="stat-block priority-stat">
        <div class="stat-header">
          <span>Répartition par Priorité</span>
        </div>
        <div class="pie-wrapper">
          <div id="priority-pie" class="pie-chart"></div>
          <div class="pie-legend">
            <div><span class="dot high"></span> Haute (<span id="pct-high">0%</span>)</div>
            <div><span class="dot medium"></span> Moyenne (<span id="pct-medium">0%</span>)</div>
            <div><span class="dot low"></span> Basse (<span id="pct-low">0%</span>)</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Filtres -->
    <div class="filters">
      <button class="filter-btn active" data-filter="all">Toutes</button>
      <button class="filter-btn" data-filter="active">Actives</button>
      <button class="filter-btn" data-filter="completed">Terminées</button>
    </div>

    <!-- Liste de tâches -->
    <ul id="todo-list"></ul>
  </div>

  <script src="script.js"></script>
</body>
</html>
